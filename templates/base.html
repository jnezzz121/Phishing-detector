<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИБ Блог — Проверка фишинга</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            position: relative;
        }
        
        /* Мраморно-керамогранитная текстура через CSS (без внешних изображений) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    45deg,
                    rgba(30, 30, 35, 0.4) 0px,
                    rgba(30, 30, 35, 0.4) 2px,
                    rgba(20, 20, 25, 0.4) 2px,
                    rgba(20, 20, 25, 0.4) 8px
                ),
                repeating-linear-gradient(
                    135deg,
                    rgba(40, 40, 45, 0.3) 0px,
                    rgba(40, 40, 45, 0.3) 1px,
                    transparent 1px,
                    transparent 12px
                );
            pointer-events: none;
            z-index: -1;
        }
        
        /* Добавляем свечение по краям */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        
        /* Навигация — чёрный стеклянный эффект */
        .navbar {
            background: rgba(10, 10, 10, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #d4af37 0%, #f5e7a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        
        .navbar-nav .nav-link {
            color: #e0e0e0 !important;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .navbar-nav .nav-link:hover {
            color: #d4af37 !important;
        }
        
        .navbar-nav .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #d4af37, #f5e7a3);
            transition: width 0.3s ease;
        }
        
        .navbar-nav .nav-link:hover::after {
            width: 80%;
        }
        
        /* Карточки — стеклянные, с золотой каймой */
        .card {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 16px;
            transition: all 0.3s ease;
            color: #e0e0e0;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.1);
        }
        
        .card-title {
            color: #d4af37;
            font-weight: 600;
        }
        
        .card-text {
            color: #b0b0b0;
        }
        
        /* Кнопки */
        .btn-primary {
            background: linear-gradient(135deg, #d4af37 0%, #c4a030 100%);
            border: none;
            color: #0a0a0a;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #e0b840 0%, #d0a830 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            border: none;
            border-radius: 30px;
            padding: 10px 24px;
            font-weight: 600;
        }
        
        .btn-success:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(46, 125, 50, 0.4);
        }
        
        .btn-secondary {
            background: rgba(100, 100, 110, 0.8);
            border: none;
            border-radius: 30px;
            padding: 10px 24px;
            font-weight: 500;
        }
        
        /* Формы */
        .form-control, .form-control:focus {
            background: rgba(30, 30, 35, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: #ffffff;
            padding: 12px 16px;
        }
        
        .form-control:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            background: rgba(30, 30, 35, 0.95);
        }
        
        .form-label {
            color: #d4af37;
            font-weight: 500;
        }
        
        .form-text {
            color: #888;
        }
        
        /* Алерты */
        .alert-danger {
            background: rgba(244, 67, 54, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 67, 54, 0.5);
            border-radius: 16px;
            color: #ff8a80;
        }
        
        .alert-success {
            background: rgba(76, 175, 80, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 16px;
            color: #a5d6a7;
        }
        
        /* Футер */
        .footer {
            margin-top: 60px;
            padding: 30px 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .footer p {
            color: #888;
        }
        
        /* Статьи */
        .article-content {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #c0c0c0;
        }
        
        .article-content h2 {
            color: #d4af37;
            margin-top: 32px;
            margin-bottom: 16px;
            font-size: 1.8rem;
        }
        
        .article-content h3 {
            color: #e0c860;
            margin-top: 24px;
            margin-bottom: 12px;
        }
        
        .article-content p {
            margin-bottom: 16px;
        }
        
        .article-content ul, .article-content ol {
            margin-bottom: 20px;
            padding-left: 24px;
        }
        
        .article-content li {
            margin-bottom: 8px;
        }
        
        .article-content code {
            background: rgba(212, 175, 55, 0.15);
            padding: 2px 8px;
            border-radius: 6px;
            color: #d4af37;
            font-size: 0.9rem;
        }
        
        /* Таблицы в статьях */
        .table {
            background: rgba(20, 20, 25, 0.6);
            border-radius: 12px;
            color: #e0e0e0;
        }
        
        .table thead th {
            border-bottom: 2px solid #d4af37;
            color: #d4af37;
        }
        
        /* Сайдбар */
        .bg-light {
            background: rgba(20, 20, 25, 0.7) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            color: #e0e0e0;
        }
        
        .bg-dark {
            background: rgba(10, 10, 10, 0.9) !important;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
        }
        
        h1, h2, h3, h4, h5 {
            color: #e0e0e0;
        }
        
        h1 {
            background: linear-gradient(135deg, #d4af37, #f5e7a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #e0b840;
        }
        
        /* Анимации */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card, .alert {
            animation: fadeInUp 0.5s ease-out;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🔐 ИБ Блог</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="/check">🔍 Проверить URL</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <div class="container">
            <p class="mb-0">© 2026 — Система обнаружения фишинговых атак | Дипломный проект</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
