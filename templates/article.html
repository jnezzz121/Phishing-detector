{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <h1 class="mb-4">{{ title }}</h1>
        <div class="article-content">
            {{ content|safe }}
        </div>
        <a href="/" class="btn btn-secondary mt-4">← Назад к статьям</a>
    </div>
    <div class="col-md-4">
        <div class="card bg-light">
            <div class="card-body">
                <h5>🔍 Проверьте ссылку</h5>
                <p>Есть подозрительная ссылка? Проверьте её в нашей системе.</p>
                <a href="/check" class="btn btn-success">Перейти к проверке</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
